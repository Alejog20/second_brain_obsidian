# Second Brain — worker service
#
# This container is invoked on-demand by launchd (see the .plist file), e.g.:
#   docker compose run --rm worker python -m src.jobs.nightly_run
#
# It intentionally has no long-running command, so `docker compose up` does
# nothing by itself — that's expected. Ollama is NOT a service here: on
# Apple Silicon, Docker Desktop cannot pass the GPU through to a Linux
# container, so Ollama should run natively on macOS (`brew install ollama`)
# and be reached at host.docker.internal, not containerized.

services:
  worker:
    build: ./worker
    image: second-brain-worker:latest
    volumes:
      - ${VAULT_PATH}:/vault
      - ./data:/data
      - ./logs:/logs
      - ./config.yaml:/data/config.yaml:ro
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - VAULT_PATH=/vault
      - DATA_PATH=/data
      - CONFIG_PATH=/data/config.yaml
      - DRY_RUN=${DRY_RUN:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"